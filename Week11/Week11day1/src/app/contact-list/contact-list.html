<h2>Contact List</h2>

<div *ngIf="contacts.length === 0">
  No Contacts Available
</div>

<table *ngIf="contacts.length > 0" border="1" cellpadding="10">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let contact of contacts"
        [ngClass]="contact.isActive ? 'active-contact' : 'inactive-contact'"
        [ngStyle]="{'color': contact.isActive ? 'green' : 'red'}">

      <td>{{contact.contactId}}</td>
      <td>{{contact.name}}</td>
      <td>{{contact.email}}</td>
      <td>{{contact.phone}}</td>

      <td>
        <span *ngIf="contact.isActive; else inactiveBlock">
          Active Contact
        </span>

        <ng-template #inactiveBlock>
          Inactive Contact 
        </ng-template>
      </td>

    </tr>
  </tbody>
</table>
