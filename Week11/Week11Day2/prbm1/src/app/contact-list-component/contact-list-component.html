<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactList</title>
</head>
<body>
    
    <table border="1">
        <tr>
            <th>Contact Id</th><th>Contact Name</th><th>Contact Email</th><th>Mobile</th>
        </tr>
        <tr *ngFor="let contact of contacts">
            <td>{{contact.id}}</td>
            <td>{{contact.name}}</td>
            <td>{{contact.email}}</td>
            <td>{{contact.phone}}</td>
        </tr>
    </table>


</body>
</html>
