<form (ngSubmit)="Submit()" #loginForm="ngForm">
  <div>
    <label>EmailID :</label>
    <input type="email" name="id" [(ngModel)]="user.id" required>
  </div>
  <div>
    <label>Password :</label>
    <input type="password" name="password" [(ngModel)]="user.password" required>
  </div>
  <div>
    <button type="submit">Login</button>
  </div>
</form>
<p style="color:red">
  {{error}}
</p>
